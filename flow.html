<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mandrake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#075e54;overflow:hidden;height:100vh}
#pub-wrap{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;display:flex;flex-direction:column;z-index:1;height:100%}
#pub-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 14px;background:#075e54;color:white}
.pub-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;background-size:cover;background-position:center}
#pub-info{flex:1}
#pub-name{font-size:14px;font-weight:600;margin:0}
#pub-status{font-size:11px;opacity:.75}
#pub-icons{display:flex;gap:12px}
#pub-msgs{flex:1;min-height:0;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:8px;background:#efeae2;scroll-behavior:smooth}
#pub-in{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:4px;
  padding:5px 6px 5px 6px;
  background:#f0f2f5;
  border-top:1px solid #e9edef;
  min-height:58px;
  box-sizing:border-box;
}
.wpp-icon-btn{
  background:none;border:none;cursor:pointer;
  padding:4px;flex-shrink:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
}
#input-wrap{
  flex:1;display:flex;align-items:center;
  background:white;border-radius:22px;
  padding:6px 8px 6px 14px;
  min-height:42px;gap:4px;
  box-shadow:0 1px 2px rgba(0,0,0,.12);
}
#pub-input{
  flex:1;border:none;font-size:16px;outline:none;
  background:transparent;color:#3b4a54;
  font-family:inherit;min-width:0;padding:0;
  line-height:1.4;
}
#input-right-icons{display:flex;align-items:center;flex-shrink:0;gap:2px;}
#btn-camera{
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;padding:2px;
  border-radius:50%;width:30px;height:30px;
  transition:opacity .15s,width .15s;overflow:hidden;
}
#pub-send{
  width:46px;height:46px;
  border-radius:50%;
  background:#00a884;
  color:white;border:none;cursor:pointer;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,.25);
  transition:background .2s;
}
#pub-send:active{transform:scale(.92);}

.pbub{max-width:78%;padding:9px 13px;border-radius:12px;font-size:16px;line-height:1.55;word-break:break-word}
.pbub.bot{background:white;color:#333;border-bottom-left-radius:3px;align-self:flex-start}
.pbub.usr{background:#dcf8c6;color:#333;border-bottom-right-radius:3px;align-self:flex-end}
@keyframes tdot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#999;animation:tdot 1s infinite;display:inline-block}
.choices-wrap{display:flex;flex-direction:column;gap:8px;margin-top:4px;align-self:flex-end;width:88%}
.choice-btn{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:#00a884;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;text-align:left;width:100%;font-family:inherit}
.choice-btn::after{content:'›';font-size:20px;font-weight:300}
.collect-wrap{background:rgba(0,0,0,.06);border-radius:10px;padding:10px;margin-top:4px;max-width:85%}
.collect-field{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #ccc;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box}
.collect-field:focus{border-color:#25d366}
.collect-submit{margin-top:8px;padding:9px 0;background:#25d366;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-family:inherit;font-weight:600}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes feedIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
@keyframes loadFill{from{width:0}to{width:100%}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}
#loading-screen{position:fixed;inset:0;background:#075e54;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;font-family:sans-serif;text-align:center}
#error-screen{position:fixed;inset:0;background:#050714;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;font-family:sans-serif;text-align:center;padding:40px}
</style>
</head>
<body>
<div id="loading-screen">
  <div style="font-size:48px;margin-bottom:16px">💬</div>
  <p style="font-size:16px;opacity:.8">Carregando...</p>
</div>
<div id="error-screen">
  <div style="font-size:52px;margin-bottom:14px">🔍</div>
  <h2 style="font-size:22px;font-weight:700;margin-bottom:10px">Fluxo não encontrado</h2>
  <p style="color:rgba(255,255,255,.5);font-size:14px;line-height:1.6">O link pode ter expirado ou o fluxo foi removido.</p>
</div>
<div id="pub-wrap" style="display:none">
  <div id="pub-bar">
    <div class="pub-av" id="pub-av">🤖</div>
    <div id="pub-info">
      <p id="pub-name">Atendente</p>
      <span id="pub-status">online</span>
    </div>
    <div id="pub-icons">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white" style="cursor:pointer"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white" style="cursor:pointer"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white" style="cursor:pointer"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    </div>
  </div>
  <div id="pub-msgs"></div>
  <div id="pub-in">
    <button class="wpp-icon-btn" title="Emoji">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8.5 14s1.5 2 3.5 2 3.5-2 3.5-2"/>
        <line x1="9" y1="9.5" x2="9" y2="9.5" stroke="#8696a0" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="15" y1="9.5" x2="15" y2="9.5" stroke="#8696a0" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="input-wrap">
      <input id="pub-input" placeholder="Aa" autocomplete="off">
      <div id="input-right-icons">
        <button class="wpp-icon-btn" title="Anexar" style="width:30px;height:30px;padding:2px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="2" stroke-linecap="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button id="btn-camera" title="Câmera">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
      </div>
    </div>
    <button id="pub-send">
      <svg id="icon-mic" width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
      <svg id="icon-send" width="22" height="22" viewBox="0 0 24 24" fill="white" style="display:none">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>
<script>
'use strict';
let pubNodes=[],pubEdges=[],pubIdx=0,pubOrdered=[];
let curFId='',pubWebhook='',captureProfile={};

function decodeFlow(s){
  if(!s||s.length<10)return null;
  s=s.replace(/ /g,'+').replace(/-/g,'+').replace(/_/g,'/');
  try{
    var raw=atob(s);
    var escaped='';
    for(var i=0;i<raw.length;i++){
      var c=raw.charCodeAt(i);
      escaped+=c>127?'%'+c.toString(16).toUpperCase().padStart(2,'0'):raw[i];
    }
    var d=JSON.parse(decodeURIComponent(escaped));
    if(d&&d.nd)return mapFlow(d);
  }catch(e1){
    try{
      var raw2=atob(s);
      var bytes=new Uint8Array(raw2.length);
      for(var j=0;j<raw2.length;j++)bytes[j]=raw2.charCodeAt(j);
      var d2=JSON.parse(new TextDecoder('utf-8').decode(bytes));
      if(d2&&d2.nd)return mapFlow(d2);
    }catch(e2){return null;}
  }
  return null;
}

function mapFlow(d){
  return{
    id:d.id,name:d.n||'Fluxo',channel:d.ch||'wpp',
    botName:d.bn||'Atendente',botAvatar:d.ba||'',
    webhook:d.wh||'',pixel:d.px||'',gtag:d.gt||'',bgColor:d.bg||'',
    nodes:(d.nd||[]).map(function(n){
      // Restore images from localStorage if they were stored separately
      var da=n.da||'';
      var iu=n.iu||'';
      if(da.indexOf('__img__')===0){try{da=localStorage.getItem('mdk_img_'+d.id+'_'+n.i)||da;}catch(e){}}
      if(iu.indexOf('__img__')===0){try{iu=localStorage.getItem('mdk_img_'+d.id+'_'+n.i+'_iu')||iu;}catch(e){}}
      return{
        id:n.i,type:n.t,x:n.x||0,y:n.y||0,
        content:n.c||'',url:n.u||'',delay:n.d||0,
        options:n.o||'',inputType:n.it||'',placeholder:n.ph||'',
        webhook:n.wk||'',data:da,link:n.lk||'',imgUrl:iu
      };
    }),
    edges:(d.ed||[]).map(function(e){return{id:e.i,from:e.f,to:e.t};})
  };
}

function buildOrder(nodes,edges){
  if(!nodes.length)return[];
  var hasIn=new Set(edges.map(function(e){return e.to;}));
  var root=nodes.find(function(n){return!hasIn.has(n.id);})||nodes[0];
  var visited=new Set(),order=[],queue=[root.id];
  while(queue.length){
    var id=queue.shift();
    if(visited.has(id))continue;
    visited.add(id);
    var n=nodes.find(function(x){return x.id===id;});
    if(n)order.push(n);
    edges.filter(function(e){return e.from===id;}).forEach(function(e){queue.push(e.to);});
  }
  nodes.forEach(function(n){if(!visited.has(n.id))order.push(n);});
  return order;
}

function startFlow(flow){
  curFId=flow.id||'pub';
  pubWebhook=flow.webhook||'';
  captureProfile={flowId:curFId,ts:new Date().toISOString()};
  try{sessionStorage.setItem('mdk_wh',pubWebhook);}catch(e){}
  var nameEl=document.getElementById('pub-name');
  var avEl=document.getElementById('pub-av');
  if(nameEl)nameEl.textContent=flow.botName||'Atendente';
  if(avEl){
    var av=flow.botAvatar||'';
    if(av.startsWith('http')||av.startsWith('data:')){
      avEl.style.backgroundImage='url('+av+')';
      avEl.style.backgroundSize='cover';
      avEl.textContent='';
    }
  }
  pubNodes=flow.nodes||[];
  pubEdges=flow.edges||[];
  pubOrdered=buildOrder(pubNodes,pubEdges);
  pubIdx=0;
  var msgs=document.getElementById('pub-msgs');
  if(msgs){
    msgs.innerHTML='';
    // Apply saved background color
    if(flow.bgColor&&flow.bgColor!=='__pattern_dark'){
      msgs.style.background=flow.bgColor;
    }else if(flow.bgColor==='__pattern_dark'){
      msgs.style.background='#1a1a1a';
      msgs.style.backgroundImage='radial-gradient(rgba(255,255,255,0.05) 1px,transparent 1px)';
      msgs.style.backgroundSize='24px 24px';
    }
  }
  document.getElementById('pub-wrap').style.display='flex';
  setTimeout(function(){nextNode();},500);
}

function nextNode(){
  if(pubIdx>=pubOrdered.length)return;
  var n=pubOrdered[pubIdx++];
  if(n.type==='delay'){
    showTyping();
    setTimeout(function(){hideTyping();nextNode();},(n.delay||2)*1000);
    return;
  }
  renderNode(n);
  var pauseTypes=['question','choices','collect','whatsapp','options','continueBtn'];
  var endTypes=['end'];
  var slowTypes=['scarcity','discount','testimonial','bonus','product','linkimg','loading','list'];
  if(endTypes.indexOf(n.type)>=0)return;
  if(n.type==='confetti')return;
  if(pauseTypes.indexOf(n.type)>=0)return;
  var delay=slowTypes.indexOf(n.type)>=0?1400:800;
  setTimeout(function(){nextNode();},delay);
}

function sendUserMsg(text){
  if(!text.trim())return;
  addBubble({type:'_user',content:text},'usr');
  setTimeout(function(){nextNode();},600);
}

function splitLines(str){
  return(str||'').split(/\n|\\n/).filter(function(s){return s.trim();});
}

function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return pad(h)+':'+pad(m)+':'+pad(sec);
  return pad(m)+':'+pad(sec);
}
function pad(n){return String(n).padStart(2,'0');}
function getYT(url){
  if(!url)return null;
  var m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m?'https://www.youtube.com/embed/'+m[1]:null;
}

function fireConfetti(){
  var colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#ff69b4','#00e5c3'];
  for(var i=0;i<60;i++){
    var p=document.createElement('div');
    var size=(Math.random()*8+4)+'px';
    p.style.cssText='position:fixed;pointer-events:none;z-index:99999;width:'+size+';height:'+size+';border-radius:'+(Math.random()>.5?'50%':'2px')+';left:'+Math.random()*100+'vw;top:-20px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation:confetti-fall '+(1.5+Math.random()*1.5)+'s ease-in '+(Math.random()*.8)+'s forwards';
    document.body.appendChild(p);
    setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},3500);
  }
}

var typingEl=null;
function showTyping(){
  var msgs=document.getElementById('pub-msgs');if(!msgs)return;
  typingEl=document.createElement('div');
  typingEl.className='pbub bot';
  typingEl.style.cssText='display:flex;gap:4px;align-items:center;padding:10px 14px';
  typingEl.innerHTML='<div class="typing-dot" style="animation-delay:0s"></div><div class="typing-dot" style="animation-delay:.2s"></div><div class="typing-dot" style="animation-delay:.4s"></div>';
  msgs.appendChild(typingEl);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){if(typingEl){typingEl.parentNode&&typingEl.parentNode.removeChild(typingEl);typingEl=null;}}

function saveLeadLocal(val,type,label){
  try{
    var key='mdk_leads_'+(curFId||'pub');
    var leads=JSON.parse(localStorage.getItem(key)||'[]');
    leads.push({value:val,type:type,label:label,flowId:curFId,ts:new Date().toISOString()});
    localStorage.setItem(key,JSON.stringify(leads));
  }catch(e){}
}
function sendWebhook(val,type,label){
  var wh=pubWebhook||(function(){try{return sessionStorage.getItem('mdk_wh')||'';}catch(e){return '';}}());
  if(!wh)return;
  var payload=Object.assign({},captureProfile,{ultimoCampo:label,ultimoValor:val,type:type,flowId:curFId});
  fetch(wh,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
}

function addBubble(n,who){
  var c=document.getElementById('pub-msgs');if(!c)return;
  if(who==='usr'){
    var b=document.createElement('div');b.className='pbub usr';b.textContent=n.content||'';
    c.appendChild(b);c.scrollTop=c.scrollHeight;return;
  }
  if(n.type==='confetti'){
    fireConfetti();
    if(n.content){var cb=document.createElement('div');cb.className='pbub bot';cb.textContent=n.content;c.appendChild(cb);}
    c.scrollTop=c.scrollHeight;
    setTimeout(function(){nextNode();},800);
    return;
  }
  if(n.type==='choices'){
    if(n.content){var qb=document.createElement('div');qb.className='pbub bot';qb.textContent=n.content;c.appendChild(qb);}
    var wrap=document.createElement('div');wrap.className='choices-wrap';
    var opts=splitLines(n.options||'Opção 1\nOpção 2');
    opts.forEach(function(opt){
      var btn=document.createElement('button');btn.className='choice-btn';btn.textContent=opt.trim();
      btn.onclick=function(){wrap.parentNode&&wrap.parentNode.removeChild(wrap);sendUserMsg(opt.trim());};
      wrap.appendChild(btn);
    });
    c.appendChild(wrap);c.scrollTop=c.scrollHeight;return;
  }
  if(n.type==='whatsapp'||n.type==='collect'){
    var isWpp=n.type==='whatsapp';
    if(n.content){var lb=document.createElement('div');lb.className='pbub bot';lb.textContent=n.content;c.appendChild(lb);}
    var ww=document.createElement('div');ww.className='collect-wrap';
    var fld=document.createElement('input');fld.className='collect-field';
    var pmap={email:'seu@email.com',tel:'(11) 99999-9999',number:'Digite um número...'};
    fld.placeholder=isWpp?'(11) 99999-9999':(n.placeholder||pmap[n.inputType]||'Digite aqui...');
    fld.type=isWpp?'tel':(n.inputType||'text');
    if(isWpp)fld.inputMode='numeric';
    var sub=document.createElement('button');sub.className='collect-submit';
    sub.textContent=isWpp?'📱 Enviar WhatsApp':'Enviar';
    sub.onclick=function(){
      var val=fld.value.trim();if(!val)return;
      var display=val;
      if(isWpp){
        val=val.replace(/\D/g,'');
        if(val.length<10){alert('Digite um número válido com DDD');return;}
        display='📱 '+(val.length===11?'('+val.slice(0,2)+') '+val.slice(2,7)+'-'+val.slice(7):'('+val.slice(0,2)+') '+val.slice(2,6)+'-'+val.slice(6));
        captureProfile['whatsapp']=display;
      }else{
        var fk=n.inputType==='email'?'email':n.inputType==='tel'?'telefone':(n.content||n.inputType||'campo');
        captureProfile[fk]=val;
      }
      captureProfile.ts=new Date().toISOString();
      ww.parentNode&&ww.parentNode.removeChild(ww);
      sendUserMsg(display);
      saveLeadLocal(val,isWpp?'whatsapp':(n.inputType||'text'),n.content||'');
      sendWebhook(val,isWpp?'whatsapp':(n.inputType||'text'),n.content||'');
    };
    fld.addEventListener('keydown',function(e){if(e.key==='Enter')sub.click();});
    ww.appendChild(fld);ww.appendChild(sub);c.appendChild(ww);c.scrollTop=c.scrollHeight;return;
  }
  var b=document.createElement('div');b.className='pbub bot';
  if(n.type==='image'){
    var url=n.url||n.data||'';
    if(url){
      var imgWrap=document.createElement('div');imgWrap.style.cssText='max-width:100%;background:#f5f5f5;border-radius:10px;overflow:hidden;min-height:60px;display:flex;align-items:center;justify-content:center';
      var img=document.createElement('img');
      img.src=url;
      img.style.cssText='max-width:100%;display:block;pointer-events:none';
      img.setAttribute('crossorigin','anonymous');
      img.onerror=function(){
        imgWrap.style.cssText='';
        imgWrap.innerHTML='';
        // Fallback: show as clickable link if URL
        if(url.startsWith('http')){
          var fb=document.createElement('a');fb.href=url;fb.target='_blank';
          fb.style.cssText='display:block;padding:12px 16px;background:white;border-radius:10px;color:#075e54;text-decoration:none;font-size:14px';
          fb.textContent='🖼️ '+(n.content||'Ver imagem');
          imgWrap.appendChild(fb);
        }else{imgWrap.textContent='🖼️ Imagem';}
      };
      imgWrap.appendChild(img);
      b.style.cssText='padding:0;background:transparent;border:none';
      b.appendChild(imgWrap);
    }
    else b.textContent='🖼️ Imagem';
  }else if(n.type==='video'){
    var yt=getYT(n.url);
    if(yt){var fr=document.createElement('iframe');fr.src=yt;fr.style.cssText='width:100%;height:200px;border:none;border-radius:10px';fr.allowFullscreen=true;fr.allow='accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture';b.style.cssText='padding:4px;background:transparent;border:none';b.appendChild(fr);}
    else b.textContent='🎥 '+(n.content||'Vídeo');
  }else if(n.type==='audio'){
    if(n.url){var au=document.createElement('audio');au.src=n.url;au.controls=true;au.style.width='100%';b.appendChild(au);}
    else b.textContent='🎵 Áudio';
  }else if(n.type==='pdf'){
    var pa=document.createElement('a');pa.href=n.url||'#';pa.target='_blank';pa.style.cssText='color:inherit;text-decoration:underline';pa.textContent='📄 '+(n.content||'Baixar PDF');b.appendChild(pa);
  }else if(n.type==='link'){
    if(n.url&&n.url.startsWith('http')){var la=document.createElement('a');la.href=n.url;la.target='_blank';la.style.cssText='color:inherit;text-decoration:underline;word-break:break-all';la.textContent=n.content||n.url;b.appendChild(la);}
    else b.textContent=n.content||n.url||'Link';
  }else if(n.type==='linkimg'){
    var liUrl=n.imgUrl||n.data||n.url||'';
    var liLink=n.link||'#';
    b.style.cssText='max-width:88%;align-self:flex-start;cursor:pointer;border-radius:10px;overflow:hidden;background:#25d366;border:none;padding:0';
    b.onclick=function(){if(liLink&&liLink!=='#')window.open(liLink,'_blank');};
    if(liUrl&&(liUrl.startsWith('http')||liUrl.startsWith('data:'))){
      var liImg=document.createElement('img');
      liImg.src=liUrl;
      liImg.setAttribute('crossorigin','anonymous');
      liImg.style.cssText='width:100%;display:block;max-height:220px;object-fit:cover';
      liImg.onerror=function(){if(liImg.parentNode)liImg.parentNode.removeChild(liImg);};
      b.appendChild(liImg);
    }
    var lc=document.createElement('div');
    lc.style.cssText='background:#25d366;color:white;padding:11px 14px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px';
    lc.innerHTML='🔗 '+(n.content||'Clique para saber mais')+' <span style="margin-left:auto">→</span>';
    b.appendChild(lc);
  }else if(n.type==='scarcity'){
    var secs=(parseInt(n.url)>0?parseInt(n.url):0)||(parseInt(n.content)>0?parseInt(n.content):0)||300;
    b.style.cssText='background:linear-gradient(135deg,#ff4444,#cc0000);color:white;border-radius:12px;padding:14px 18px;text-align:center;max-width:88%;align-self:flex-start;border:none';
    var tid='tmr-'+n.id;
    var scarTitle=isNaN(parseInt(n.content))&&n.content?n.content:'Oferta por tempo limitado!';
b.innerHTML='<div style="font-weight:700;font-size:14px;margin-bottom:6px">🔥 '+scarTitle+'</div><div id="'+tid+'" style="font-size:28px;font-weight:800;font-family:monospace;letter-spacing:2px">'+fmtTime(secs)+'</div><div style="font-size:11px;opacity:.85;margin-top:4px">⚡ Não perca esta oportunidade</div>';
    var rem=secs;
    var iv=setInterval(function(){rem--;var el=document.getElementById(tid);if(el)el.textContent=fmtTime(rem);if(rem<=0){clearInterval(iv);if(el)el.textContent='⌛ EXPIRADO';}},1000);
  }else if(n.type==='discount'){
    var dlines=splitLines(n.content||'');
    var code=n.url||dlines[1]||dlines[0]||'DESCONTO';
    var dtxt=n.url?dlines[0]||'Use o cupom:':'Use o cupom:';
    b.style.cssText='background:linear-gradient(135deg,#ff9900,#e65c00);color:white;border-radius:12px;padding:14px 18px;max-width:88%;align-self:flex-start;border:none';
    var dcid='cup-'+n.id;
    b.innerHTML='<div style="font-weight:700;font-size:14px;margin-bottom:8px">🏷️ '+dtxt+'</div><div id="'+dcid+'" style="font-size:22px;font-weight:800;letter-spacing:3px;font-family:monospace;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:6px;display:inline-block;margin:6px 0;cursor:pointer;border:2px dashed rgba(255,255,255,.5)">'+code+'</div><div style="font-size:11px;opacity:.8">👆 Toque para copiar</div>';
    setTimeout(function(){var dc=document.getElementById(dcid);if(dc)dc.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(code);var o=dc.textContent;dc.textContent='✓ Copiado!';setTimeout(function(){dc.textContent=o;},2000);};},0);
  }else if(n.type==='testimonial'){
    var tlines=splitLines(n.content||'Produto incrível!\nJoão Silva');
    var stars=parseInt(n.url)||5;
    b.style.cssText='background:white;color:#333;border-radius:12px;padding:16px;max-width:88%;align-self:flex-start;border:none';
    var starsHtml='';for(var s=0;s<Math.min(5,Math.max(1,stars));s++)starsHtml+='⭐';
    b.innerHTML='<div style="color:#f5a623;font-size:16px;margin-bottom:6px">'+starsHtml+'</div><div style="font-size:14px;font-style:italic;color:#444;line-height:1.5;margin-bottom:8px">"'+(tlines[0]||'')+'"</div>'+(tlines[1]?'<div style="font-size:12px;font-weight:600;color:#666">— '+tlines[1]+'</div>':'');
  }else if(n.type==='bonus'){
    var bitems=splitLines(n.content||'Bônus 1\nBônus 2');
    b.style.cssText='background:linear-gradient(135deg,#1b5e20,#388e3c);color:white;border-radius:12px;padding:16px;max-width:88%;align-self:flex-start;border:none';
    b.innerHTML='<div style="font-weight:700;font-size:13px;margin-bottom:8px">🎁 BÔNUS EXCLUSIVOS</div>'+bitems.map(function(i){return'<div style="display:flex;gap:8px;font-size:13px;margin-bottom:6px;align-items:flex-start"><span>✅</span><span>'+i+'</span></div>';}).join('');
  }else if(n.type==='product'){
    var plines=splitLines(n.content||'Produto\nR$ 97,00\nComprar agora');
    var pimg=n.url||n.data||'';var plink=n.link||'#';
    b.style.cssText='background:white;color:#333;border-radius:14px;overflow:hidden;max-width:88%;align-self:flex-start;box-shadow:0 2px 16px rgba(0,0,0,.1);border:none;padding:0';
    if(pimg){var pi=document.createElement('img');pi.src=pimg;pi.style.cssText='width:100%;height:140px;object-fit:cover;display:block';pi.onerror=function(){pi.parentNode&&pi.parentNode.removeChild(pi);};b.appendChild(pi);}
    var pb=document.createElement('div');pb.style.cssText='padding:12px 14px';
    pb.innerHTML='<div style="font-weight:700;font-size:15px;margin-bottom:4px">'+(plines[0]||'Produto')+'</div>'+(plines[1]?'<div style="color:#e53935;font-size:18px;font-weight:800;margin-bottom:8px">'+plines[1]+'</div>':'')+'<a href="'+(plink||'#')+'" target="_blank" style="display:block;background:#25d366;color:white;text-align:center;padding:10px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none">'+(plines[2]||'Comprar agora')+' →</a>';
    b.appendChild(pb);
  }else if(n.type==='price'){
    var prlines=splitLines(n.content||'R$ 97,00\nDe R$ 197,00\nComprar agora');
    b.style.cssText='background:white;border-radius:16px;padding:20px;text-align:center;max-width:88%;align-self:flex-start;box-shadow:0 4px 20px rgba(0,0,0,.08);border:none';
    b.innerHTML=(prlines[1]?'<div style="font-size:14px;color:#999;text-decoration:line-through;margin-bottom:4px">'+prlines[1]+'</div>':'')+'<div style="font-size:32px;font-weight:900;color:#e53935;line-height:1">'+(prlines[0]||'')+'</div><a href="'+(n.url||'#')+'" target="_blank" style="display:block;background:#25d366;color:white;text-align:center;padding:12px 20px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;margin-top:14px">'+(prlines[2]||'Comprar')+' →</a>';
  }else if(n.type==='arguments'){
    var aargs=splitLines(n.content||'');
    b.style.cssText='background:white;border-radius:12px;padding:14px 16px;max-width:90%;align-self:flex-start;border:none';
    aargs.forEach(function(arg){var el=document.createElement('div');el.style.cssText='display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:14px;color:#333;align-items:flex-start';el.innerHTML='<span style="color:#25d366;font-size:16px;flex-shrink:0">✅</span><span>'+arg+'</span>';b.appendChild(el);});
  }else if(n.type==='marquee'){
    b.style.cssText='overflow:hidden;white-space:nowrap;background:#e53935;color:white;padding:8px 0;border-radius:8px;width:92%;font-size:13px;font-weight:600;border:none';
    var mi=document.createElement('div');mi.style.cssText='display:inline-block;animation:marquee 12s linear infinite;padding-left:100%';mi.textContent=(n.content||'🔥 Mensagem!')+'   •   '+(n.content||'🔥 Mensagem!');b.appendChild(mi);
  }else if(n.type==='loading'){
    b.style.cssText='background:white;border-radius:12px;padding:16px;max-width:90%;align-self:flex-start;text-align:center;border:none';
    b.innerHTML='<div style="font-size:13px;color:#555">'+(n.content||'Carregando...')+'</div><div style="height:6px;background:#eee;border-radius:100px;overflow:hidden;margin-top:10px"><div style="height:100%;background:linear-gradient(90deg,#25d366,#128c7e);border-radius:100px;animation:loadFill 2s ease forwards"></div></div>';
  }else if(n.type==='level'){
    var lparts=(n.content||'Aprovação;85').split(';');
    var llbl=lparts[0]||'Nível';var lpct=Math.min(100,parseInt(lparts[1])||70);
    b.style.cssText='background:white;border-radius:12px;padding:14px 16px;max-width:90%;align-self:flex-start;border:none';
    b.innerHTML='<div style="display:flex;justify-content:space-between;font-size:13px;color:#333;margin-bottom:6px;font-weight:500"><span>'+llbl+'</span><span>'+lpct+'%</span></div><div style="background:#eee;border-radius:100px;height:16px;overflow:hidden"><div id="lf-'+n.id+'" style="height:100%;border-radius:100px;background:linear-gradient(90deg,#25d366,#128c7e);width:0%;transition:width 1.2s ease"></div></div>';
    setTimeout(function(){var lf=document.getElementById('lf-'+n.id);if(lf)lf.style.width=lpct+'%';},100);
  }else if(n.type==='faq'){
    var fpairs=splitLines(n.content||'Pergunta?\nResposta.');
    b.style.cssText='background:transparent;border:none;padding:0;max-width:90%;align-self:flex-start;display:flex;flex-direction:column;gap:6px';
    for(var fi=0;fi<fpairs.length;fi+=2){
      var fq=fpairs[fi]||'';var fa=fpairs[fi+1]||'';
      var fitem=document.createElement('div');fitem.style.cssText='background:white;border-radius:10px;overflow:hidden';
      var fqel=document.createElement('div');fqel.style.cssText='padding:12px 14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:#333';
      fqel.innerHTML=fq+'<span style="font-size:16px">▾</span>';
      var fael=document.createElement('div');fael.style.cssText='padding:0 14px;font-size:13px;color:#555;line-height:1.6;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s';fael.textContent=fa;
      fqel.onclick=(function(fae,fqe){return function(){var open=fae.style.maxHeight&&fae.style.maxHeight!=='0px';fae.style.maxHeight=open?'0px':'200px';fae.style.padding=open?'0 14px':'6px 14px 12px';fqe.querySelector('span').style.transform=open?'':'rotate(180deg)';};;})(fael,fqel);
      fitem.appendChild(fqel);fitem.appendChild(fael);b.appendChild(fitem);
    }
  }else if(n.type==='chart'){
    var crows=splitLines(n.content||'Resultado A;80\nResultado B;60');
    b.style.cssText='background:white;border-radius:12px;padding:14px 16px;max-width:90%;align-self:flex-start;border:none';
    crows.forEach(function(row){
      var cp=row.split(';');var clbl=cp[0]||'Item';var cpct=Math.min(100,parseInt(cp[1])||50);
      var citem=document.createElement('div');citem.style.marginBottom='10px';
      var cfid='cf-'+Math.random().toString(36).slice(2);
      citem.innerHTML='<div style="display:flex;justify-content:space-between;font-size:12px;color:#333;margin-bottom:4px;font-weight:500"><span>'+clbl+'</span><span>'+cpct+'%</span></div><div style="background:#eee;border-radius:100px;height:12px;overflow:hidden"><div id="'+cfid+'" style="height:100%;border-radius:100px;background:linear-gradient(90deg,#25d366,#128c7e);width:0%;transition:width 1s ease"></div></div>';
      b.appendChild(citem);
      setTimeout(function(){var cf=document.getElementById(cfid);if(cf)cf.style.width=cpct+'%';},100);
    });
  }else if(n.type==='list'){
    var litems=splitLines(n.content||'');
    b.style.cssText='display:flex;flex-direction:column;gap:6px;max-width:90%;align-self:flex-start;background:transparent;border:none;padding:0';
    litems.forEach(function(item,idx){
      setTimeout(function(){
        var el=document.createElement('div');
        el.style.cssText='background:white;border-radius:8px;padding:9px 12px;font-size:13px;color:#333;display:flex;align-items:center;gap:8px;animation:feedIn .4s ease';
        el.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:#25d366;flex-shrink:0"></div><span>'+item+'</span>';
        b.appendChild(el);
        var msgs=document.getElementById('pub-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
      },idx*600);
    });
  }else if(n.type==='carousel'){
    var cslides=splitLines(n.content||'');
    b.style.cssText='max-width:90%;align-self:flex-start;overflow:hidden;background:transparent;border:none;padding:0';
    var ctrack=document.createElement('div');ctrack.style.cssText='display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:4px';
    cslides.forEach(function(slide){
      var cp2=slide.split('|');
      var cel=document.createElement('div');cel.style.cssText='min-width:200px;scroll-snap-align:start;background:white;border-radius:12px;overflow:hidden;flex-shrink:0';
      cel.innerHTML=(cp2[0]&&cp2[0].startsWith('http')?'<img src="'+cp2[0]+'" style="width:100%;height:130px;object-fit:cover;display:block" alt="">':'')+'<div style="padding:10px 12px;font-size:13px;color:#333">'+(cp2[1]||cp2[0]||'')+'</div>';
      ctrack.appendChild(cel);
    });
    b.appendChild(ctrack);
  }else if(n.type==='compare'){
    var comprows=splitLines(n.content||'Sem Produto\nCom Produto');
    var compBad=comprows[0]||'Sem';var compGood=comprows[1]||'Com';
    var compData=comprows.slice(2);
    b.style.cssText='background:white;border-radius:12px;overflow:hidden;max-width:92%;align-self:flex-start;border:none;padding:0';
    b.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr"><div style="padding:10px 12px;text-align:center;font-weight:700;font-size:13px;background:#ffebee;color:#c62828">❌ '+compBad+'</div><div style="padding:10px 12px;text-align:center;font-weight:700;font-size:13px;background:#e8f5e9;color:#2e7d32">✅ '+compGood+'</div></div>'+compData.map(function(r){var rp=r.split('|');return'<div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #f0f0f0"><div style="padding:9px 12px;font-size:13px;color:#e53935;text-align:center">'+(rp[0]||'—')+'</div><div style="padding:9px 12px;font-size:13px;color:#43a047;font-weight:600;text-align:center">'+(rp[1]||'✓')+'</div></div>';}).join('');
  }else if(n.type==='options'){
    var oopts=splitLines(n.content||'Opção A\nOpção B');
    b.style.cssText='display:flex;flex-direction:column;gap:6px;max-width:90%;align-self:flex-start;background:transparent;border:none;padding:0';
    oopts.forEach(function(opt){
      var obtn=document.createElement('button');
      obtn.style.cssText='background:white;border:2px solid #e0e0e0;border-radius:10px;padding:11px 14px;font-size:14px;cursor:pointer;color:#333;font-family:inherit;text-align:left;transition:all .2s';
      obtn.textContent=opt;
      obtn.onclick=function(){
        b.querySelectorAll('button').forEach(function(x){x.style.borderColor='#e0e0e0';x.style.background='white';});
        obtn.style.borderColor='#25d366';obtn.style.background='#f1fdf5';
        sendUserMsg(opt);
      };
      b.appendChild(obtn);
    });
  }else if(n.type==='continueBtn'){
    b.style.cssText='display:block;background:#25d366;color:white;text-align:center;padding:14px 24px;border-radius:12px;font-weight:700;font-size:16px;border:none;cursor:pointer;font-family:inherit;max-width:90%;align-self:flex-start';
    b.textContent=n.content||'Continuar →';
    b.onclick=function(){b.disabled=true;b.style.opacity='.6';setTimeout(function(){nextNode();},300);};
  }else if(n.type==='title'){
    b.style.cssText='font-size:20px;font-weight:800;color:#111;text-align:center;padding:12px 16px;background:white;border-radius:12px;max-width:90%;align-self:flex-start;border:none';
    b.textContent=n.content||'Título';
  }else if(n.type==='text'){
    b.style.cssText='font-size:14px;color:#333;line-height:1.7;padding:12px 16px;background:white;border-radius:12px;max-width:90%;align-self:flex-start;white-space:pre-wrap;border:none';
    b.textContent=n.content||'';
  }else if(n.type==='invisible'||n.type==='condition'||n.type==='_meta'){
    b.style.display='none';
  }else{
    var txt=n.content||'';
    if(/https?:\/\/[^\s]+/.test(txt)){
      b.innerHTML=txt.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;word-break:break-all">$1</a>');
    }else{
      b.textContent=txt;
    }
    if(n.type==='question'){
      var inp2=document.getElementById('pub-input');
      if(inp2){inp2.focus();inp2.style.borderColor='rgba(0,184,148,.7)';}
    }
  }
  c.appendChild(b);c.scrollTop=c.scrollHeight;
}

function renderNode(n){
  addBubble(n,'bot');
}

function getRawParam(name){
  var rx=new RegExp('[?&]'+name+'=([^&]*)');
  var m=location.search.match(rx);
  return m?decodeURIComponent(m[1]):null;
}

document.getElementById('pub-send').addEventListener('click',function(){
  var inp=document.getElementById('pub-input');
  var val=(inp&&inp.value||'').trim();
  if(val){inp.value='';sendUserMsg(val);}
});
document.getElementById('pub-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var inp=document.getElementById('pub-input');
    var val=(inp&&inp.value||'').trim();
    if(val){inp.value='';sendUserMsg(val);}
  }
});
document.getElementById('pub-input').addEventListener('input',function(){
  var val=(document.getElementById('pub-input').value||'').trim();
  // Mic <-> Send
  var mic=document.getElementById('icon-mic');
  var send=document.getElementById('icon-send');
  if(mic)mic.style.display=val?'none':'block';
  if(send)send.style.display=val?'block':'none';
  // Camera: some ao digitar, volta ao apagar
  var cam=document.getElementById('btn-camera');
  if(cam){
    if(val){cam.style.width='0';cam.style.padding='0';cam.style.overflow='hidden';cam.style.opacity='0';}
    else{cam.style.width='30px';cam.style.padding='2px';cam.style.overflow='';cam.style.opacity='1';}
  }
});

window.addEventListener('load',function(){
  var fdata=getRawParam('fdata');
  var fid=getRawParam('flow');
  if(!fdata&&!fid){window.location.href=location.origin+'/';return;}
  if(fdata){
    var flow=decodeFlow(fdata);
    if(flow&&flow.nodes&&flow.nodes.length>0){
      document.getElementById('loading-screen').style.display='none';
      try{sessionStorage.setItem('mdk_flow_'+flow.id,JSON.stringify(flow));}catch(e){}
      try{history.replaceState({},'',location.pathname+'?flow='+flow.id);}catch(e){}
      startFlow(flow);return;
    }
  }
  if(fid){
    try{
      var cached=sessionStorage.getItem('mdk_flow_'+fid);
      if(cached){var cf=JSON.parse(cached);if(cf&&cf.nodes&&cf.nodes.length>0){document.getElementById('loading-screen').style.display='none';startFlow(cf);return;}}
    }catch(e){}
    try{
      var cached2=localStorage.getItem('mdk_flow_'+fid);
      if(cached2){var cf2=JSON.parse(cached2);if(cf2&&cf2.nodes&&cf2.nodes.length>0){document.getElementById('loading-screen').style.display='none';startFlow(cf2);return;}}
    }catch(e){}
  }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('error-screen').style.display='flex';
});
</script>
</body>
</html>
